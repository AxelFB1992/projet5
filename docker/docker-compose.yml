version: '3.8'
services:
  mongodb:
    image: mongo:latest
    environment:
    #Sécuriser les identifiants de connexion
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: examplepassword
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - my_network

  migrator:
    build:
        context: ..
        dockerfile: docker/Dockerfile
    volumes:
      - ${PWD}/data:/app/data
    depends_on:
      - mongodb
    networks:
      - my_network

volumes:
  mongo-data:

networks:
  my_network:
    driver: bridge

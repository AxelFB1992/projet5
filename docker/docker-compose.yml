version: '3.8'
services:
  mongodb:
    image: mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: examplepassword
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  migrator:
    build: .
    volumes:
      - ./data:/data
    depends_on:
      - mongodb

volumes:
  mongo-data:

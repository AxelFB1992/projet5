version: '3.8'
services:
  mongodb:
    image: mongo:latest
    environment:
    #Sécuriser les identifiants de connexion
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: examplepassword
    ports:
      - "27017:27017"
    volumes:
    #Tout ce qui est écrit dans le dossier /data/db à l'intérieur du conteneur doit être sauvegardé dans le volume nommé mongo-data à l'extérieur
    #L'image mongo:latest est configurée par ses développeurs pour stocker toutes ses données dans le dossier /data/db à l'intérieur du conteneur
      - mongo-data:/data/db
    networks:
      - my_network

  migrator:
    build:
        context: ..
        dockerfile: docker/Dockerfile
    volumes:
      - ../data:/app/data 
      #- ${PWD}/data:/app/data
    depends_on:
      - mongodb
    networks:
      - my_network

volumes:
  mongo-data:

networks:
  my_network:
    driver: bridge
